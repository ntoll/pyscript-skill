name: Package skill on release

on:
  release:
    types: [published]

jobs:
  package:
    runs-on: ubuntu-latest

    permissions:
      # Required to upload the packaged file as a release asset.
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Package skill
        # Produces pyscript.skill as a zip of the skill files.
        # Excludes repo metadata that is not part of the skill itself.
        # The .skill extension is conventional — it is a standard zip file.
        run: |
          zip -r pyscript.skill . \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".gitignore" \
            --exclude "*.skill"

      - name: Upload skill to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" pyscript.skill \
            --clobber
